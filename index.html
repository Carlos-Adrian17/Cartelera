<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopCinema - Cartelera Interactiva</title>
    <!-- Se fuerza el protocolo https para evitar bloqueos de contenido mixto en Azure -->
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3; 
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col">

    <header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-film text-red-500 text-2xl animate-pulse"></i>
                <span class="text-xl font-black tracking-wider uppercase bg-gradient-to-r from-red-500 to-orange-500 bg-clip-text text-transparent">
                    PopCinema
                </span>
            </div>
            <div class="text-sm text-gray-400 bg-gray-800 px-3 py-1 rounded-full border border-gray-700">
                <i class="fa-solid fa-circle text-green-500 text-xs mr-1"></i> API en Vivo
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <section class="bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-8 shadow-xl">
            <div class="flex items-center gap-2 mb-4">
                <i class="fa-solid fa-sliders text-red-400"></i>
                <h2 class="text-lg font-semibold text-gray-200">Panel de Búsqueda y Filtros</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="relative">
                    <label class="block text-xs font-medium text-gray-400 mb-1 uppercase tracking-wider">Buscar Película</label>
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" id="search-input" placeholder="Ej: Violet Evergarden..." 
                            class="w-full bg-gray-950 border border-gray-700 rounded-xl pl-10 pr-4 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-red-500 transition-colors">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1 uppercase tracking-wider">Género / Categoría</label>
                    <select id="genre-select" 
                        class="w-full bg-gray-950 border border-gray-700 rounded-xl px-3 py-2.5 text-sm text-gray-100 focus:outline-none focus:border-red-500 transition-colors appearance-none cursor-pointer">
                        <option value="">Todos los géneros</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1 uppercase tracking-wider">Ubicación / Cine</label>
                    <select id="location-select" 
                        class="w-full bg-gray-950 border border-gray-700 rounded-xl px-3 py-2.5 text-sm text-gray-100 focus:outline-none focus:border-red-500 transition-colors appearance-none cursor-pointer">
                        <option value="">Todas las ubicaciones</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- El contenedor que el JavaScript de app.js va a rellenar automáticamente -->
        <div id="movies-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </div>

        <div id="empty-state" class="hidden text-center py-16">
            <i class="fa-solid fa-clapperboard text-5xl text-gray-700 mb-4"></i>
            <p class="text-xl font-medium text-gray-400">No encontramos películas con esos filtros</p>
            <p class="text-sm text-gray-600 mt-1">Prueba cambiando los criterios de búsqueda.</p>
        </div>
    </main>

    <div id="movie-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl max-w-2xl w-full overflow-hidden transform scale-95 transition-transform duration-300 relative">
            <button id="close-modal" class="absolute top-4 right-4 bg-gray-950/80 hover:bg-red-500/20 text-gray-400 hover:text-red-400 p-2 rounded-full border border-gray-800 transition-colors z-10">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
            <div id="modal-content">
            </div>
        </div>
    </div>

    <footer class="border-t border-gray-900 bg-gray-950 py-6 text-center text-xs text-gray-600">
        &copy; 2026 PopCinema Inc. Optimizada con Fetch API Asíncrono.
    </footer>

    <script src="app.js"></script>
</body>
</html>
